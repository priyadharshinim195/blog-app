{% extends 'blog/base.html' %}

{% block content %}
<div class="container-fluid pb-5">
       
<div class="row gy-3">
            <div class="col-12 col-lg-8">
              <h1 class="mb-2 text-break">{{post.title}} <small class="d-block fs-6 text-muted mt-2">({{post.category.name}})</small></h1>
              <p class="text-muted small">Posted on {{post.created_at|date:"F j,Y"}}</p>
              <img src="{{post.img_url}}" class="img-fluid mb-4 rounded" alt="{{post.title}}">
              <p class="text-justify">{{post.content}}</p>
            </div> 
            <div class="col-12 col-lg-4">
              <div class="card sticky-lg-top mt-3">
                <div class="card-body">
                  <h5 class="card-title">Related Posts</h5>
                  <ul class="list-unstyled">
                    {% for related_post in related_posts %}
                    <li class="mb-2"><a href="{% url 'blog:detail' slug=related_post.slug %}" class="text-decoration-none">{{related_post.title}}</a></li>
                    {% endfor %}
                    
                  </ul>
                </div>
              </div>
            </div>
        </div>
    </div>
{% endblock %}
